<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Registration Portal - 24WH1A05A9</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
padding:40px;
min-height:100vh;
}

.container{
max-width:1100px;
margin:auto;
background:white;
border-radius:20px;
padding:35px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
color:#4e54c8;
margin-bottom:10px;
}

.header p{
color:gray;
}

.section{
margin-top:30px;
padding:25px;
background:#f8f9ff;
border-radius:15px;
border-left:6px solid #4e54c8;
}

.section h2{
margin-bottom:20px;
color:#4e54c8;
}

.form-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

.input-group{
display:flex;
flex-direction:column;
}

.input-group label{
margin-bottom:7px;
font-weight:600;
color:#444;
}

input,
select,
textarea{

padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
outline:none;
transition:.3s;

}

input:focus,
select:focus,
textarea:focus{

border-color:#667eea;
box-shadow:0 0 8px rgba(102,126,234,.3);

}

textarea{
resize:none;
height:90px;
}

.full{
grid-column:span 2;
}

button{

width:100%;
padding:16px;
margin-top:30px;
border:none;
border-radius:10px;
background:#4e54c8;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;

}

button:hover{

background:#353ab5;

}

#result{

display:none;
margin-top:30px;
padding:20px;
border-radius:12px;
background:#e9f7ef;
border-left:6px solid green;

}

#result h2{

color:green;
margin-bottom:15px;

}

.result-grid{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;

}

@media(max-width:768px){

.form-grid{
grid-template-columns:1fr;
}

.full{
grid-column:span 1;
}

.result-grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>Event Registration Portal</h1>
<p>Complete your details below</p>
</div>

<form id="registrationForm">

<div class="section">

<h2>Personal Information</h2>

<div class="form-grid">

<div class="input-group">
<label>First Name</label>
<input type="text" name="firstName" required>
</div>

<div class="input-group">
<label>Last Name</label>
<input type="text" name="lastName" required>
</div>

<div class="input-group">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="input-group">
<label>Phone Number</label>
<input type="tel" name="phone">
</div>

<div class="input-group">
<label>Date of Birth</label>
<input type="date" name="dob">
</div>

<div class="input-group">
<label>Gender</label>
<select name="gender">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<div class="input-group full">
<label>Address</label>
<textarea name="address"></textarea>
</div>

</div>
</div>

<div class="section">

<h2>Academic Details</h2>

<div class="form-grid">

<div class="input-group">
<label>College</label>
<input type="text" name="college">
</div>

<div class="input-group">
<label>Department</label>
<input type="text" name="department">
</div>

<div class="input-group">
<label>Year</label>
<input type="text" name="yearStudy">
</div>

<div class="input-group">
<label>Student ID</label>
<input type="text" name="studentId">
</div>

<div class="input-group">
<label>City</label>
<input type="text" name="city">
</div>

<div class="input-group">
<label>State</label>
<input type="text" name="state">
</div>

</div>
</div>
<div class="section">

<h2>Event Details</h2>

<div class="form-grid">

<div class="input-group">
<label>Event</label>
<select name="selectedEvent">
<option>AI Workshop</option>
<option>Hackathon</option>
<option>Tech Conference</option>
</select>
</div>

<div class="input-group">
<label>Participation Type</label>
<input type="text" name="participationType">
</div>

<div class="input-group">
<label>Team Name</label>
<input type="text" name="teamName">
</div>

<div class="input-group">
<label>Team Size</label>
<input type="number" name="teamSize">
</div>
<div class="input-group">
<label>T-Shirt Size</label>
<input type="text" name="shirtSize">
</div>

<div class="input-group">
<label>Food Preference</label>
<input type="text" name="foodPreference">
</div>

</div>
</div>

<div class="section">

<h2>Emergency Details</h2>

<div class="form-grid">

<div class="input-group">
<label>Emergency Contact</label>
<input type="text" name="emergencyName">
</div>
<div class="input-group">
<label>Relationship</label>
<input type="text" name="relationship">
</div>

<div class="input-group">
<label>Emergency Phone</label>
<input type="tel" name="emergencyPhone">
</div>

<div class="input-group">
<label>Blood Group</label>
<input type="text" name="bloodGroup">
</div>

<div class="input-group full">
<label>Skills</label>
<textarea name="skills"></textarea>
</div>

<div class="input-group full">
<label>Reason for Attending</label>
<textarea name="reason"></textarea>
</div>

</div>
</div>

<button type="submit">
Register Now
</button>

</form>
<div id="result"></div>
</div>

<script>

document.getElementById("registrationForm")
.addEventListener("submit",

async function(e){

e.preventDefault();

const formData=
Object.fromEntries(
new FormData(this)
);

console.log(formData);

try{

const response=await fetch(
"http://localhost:5000/register",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(formData)
}
);
const result=
await response.json();

console.log(result);

if(result.success){

document.getElementById("result")
.style.display="block";

document.getElementById("result")
.innerHTML=`

<h2>Registration Successful</h2>

<p><b>Name:</b>
${result.data.firstName}
${result.data.lastName}</p>
<p><b>Email:</b>
${result.data.email}</p>

<p><b>Phone:</b>
${result.data.phone}</p>

<p><b>College:</b>
${result.data.college}</p>

<p><b>Department:</b>
${result.data.department}</p>

<p><b>Event:</b>
${result.data.selectedEvent}</p>

`;

}

}
catch(error){

console.log(error);

alert("Registration Failed");

}

});

</script>
</body>
</html>
